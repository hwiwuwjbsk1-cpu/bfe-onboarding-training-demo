  <link rel="stylesheet" crossorigin href="./assets/index-lSPHMdvx.css">
  <style>
    .phase2-transition-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #eef6ff;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (() => {
      const videoSrc = './onboarding/phase2-transition.mp4';
      const overlayLabel = '第二阶段入口';

      const attachVideo = () => {
        const overlay = document.querySelector(`[aria-label="${overlayLabel}"]`);
        if (!overlay || overlay.dataset.phase2VideoAttached === 'true') return;
        const still = overlay.querySelector('img');
        if (!still) return;

        overlay.dataset.phase2VideoAttached = 'true';

        const video = document.createElement('video');
        video.className = 'phase2-transition-video';
        video.src = videoSrc;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.preload = 'auto';
        video.setAttribute('aria-hidden', 'true');
        video.addEventListener('ended', () => overlay.click(), { once: true });
        video.addEventListener('error', () => overlay.click(), { once: true });

        still.replaceWith(video);

        const play = video.play();
        if (play && typeof play.catch === 'function') {
          play.catch(() => overlay.click());
        }
      };

      const observer = new MutationObserver(() => attachVideo());
      const start = () => {
        observer.observe(document.body, { childList: true, subtree: true });
        attachVideo();
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start, { once: true });
      } else {
        start();
      }
    })();
  </script>
</body>
</html>
