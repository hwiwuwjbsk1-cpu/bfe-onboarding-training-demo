<head>

  <meta property="og:description" content="新人知识库学习 + 互动闯关 demo。" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230b66ff'/><path d='M8 7h12a4 4 0 0 1 4 4v14H11a3 3 0 0 1-3-3V7Z' fill='%23ffffff'/><path d='M12 12h8M12 16h7M12 20h5' stroke='%230b66ff' stroke-width='1.7' stroke-linecap='round'/></svg>" />
  <script type="module" crossorigin src="./assets/index-DbCv3cjM.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-lSPHMdvx.css">
  <style>
    .phase2-transition-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #eef6ff;
      pointer-events: none;
    }

    html.bfe-mini-games-open,
    html.bfe-mini-games-open body {
      overflow: hidden !important;
    }

    #bfe-mini-games-layer {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: grid;
      place-items: stretch;
      padding: 0;
      background: rgba(8, 18, 34, 0.72);
    }

    .bfe-mini-games-panel {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      overflow: hidden;
      background: #f4f9ff;
    }

    .bfe-mini-games-close {
      position: absolute;
      top: 16px;
      right: 18px;
      z-index: 2;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      color: #174474;
      background: rgba(234, 247, 255, 0.88);
      box-shadow: 0 10px 24px rgba(22, 75, 128, 0.16);
      font: 900 24px/1 "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      cursor: pointer;
    }

    .bfe-mini-games-panel iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #eaf7ff;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (() => {
      const resetMarker = 'bfe-training-reset-20260717-v1';
      const keys = [
        'bfe-general-onboarding-knowledge-visited',
        'bfe-phase-one-complete',
        'web-mini-games-stats-v1',
        'web-mini-games-progress-v1',
        'web-mini-games-map-unlocked-v1',
        'bfe-twelve-rules-stage-v1',
        'bfe-twelve-rules-mistakes-v1',
        'bfe-org-game-progress-v1',
        'bfe-org-game-mistakes-v1'
      ];

      try {
        if (localStorage.getItem(resetMarker) !== '1') {
          keys.forEach((key) => localStorage.removeItem(key));
          localStorage.setItem(resetMarker, '1');
        }
      } catch (error) {
        console.warn('Training progress reset skipped.', error);
      }
    })();
  </script>
  <script>
    (() => {
      const videoSrc = './onboarding/phase2-transition.mp4';
      const overlayLabel = '第二阶段入口';

      const attachVideo = () => {
        const overlay = document.querySelector(`[aria-label="${overlayLabel}"]`);
        if (!overlay || overlay.dataset.phase2VideoAttached === 'true') return;
        const still = overlay.querySelector('img');
        if (!still) return;

        overlay.dataset.phase2VideoAttached = 'true';

        const video = document.createElement('video');
        video.className = 'phase2-transition-video';
        video.src = videoSrc;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.preload = 'auto';
        video.setAttribute('aria-hidden', 'true');
        video.addEventListener('ended', () => overlay.click(), { once: true });
        video.addEventListener('error', () => overlay.click(), { once: true });

        still.replaceWith(video);

        const play = video.play();
        if (play && typeof play.catch === 'function') {
          play.catch(() => overlay.click());
        }
      };

      const observer = new MutationObserver(() => attachVideo());
      const start = () => {
        observer.observe(document.body, { childList: true, subtree: true });
        attachVideo();
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start, { once: true });
      } else {
        start();
      }
    })();
  </script>
  <script src="./mini-games-bridge.js"></script>
</body>
</html>
