<!doctype html>
<html lang="zh-CN">
<head>

  <meta property="og:type" content="website" />
  <meta property="og:title" content="出口易 AI 新人业务培训系统 Demo" />
  <meta property="og:description" content="新人知识库学习 + 互动闯关 demo。" />
  <meta property="og:image" content="./media/poster.jpg" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230b66ff'/><path d='M8 7h12a4 4 0 0 1 4 4v14H11a3 3 0 0 1-3-3V7Z' fill='%23ffffff'/><path d='M12 12h8M12 16h7M12 20h5' stroke='%230b66ff' stroke-width='1.7' stroke-linecap='round'/></svg>" />
  <script type="module" crossorigin src="./assets/index-DbCv3cjM.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-lSPHMdvx.css">
  <style>
    .phase2-transition-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #eef6ff;
      pointer-events: none;
    }

    html.bfe-mini-games-open,
    html.bfe-mini-games-open body {
      overflow: hidden !important;
    }

    #bfe-mini-games-layer {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(8, 18, 34, 0.72);
      backdrop-filter: blur(14px);
    }

    .bfe-mini-games-panel {
      width: min(1480px, calc(100vw - 44px));
      height: min(900px, calc(100vh - 44px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.52);
      border-radius: 22px;
      background: #f4f9ff;
      box-shadow: 0 34px 96px rgba(0, 0, 0, 0.34);
    }

    .bfe-mini-games-head {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 16px 12px 20px;
      border-bottom: 1px solid rgba(47, 128, 237, 0.16);
      background: rgba(255, 255, 255, 0.88);
      color: #143b78;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    .bfe-mini-games-head div {
      display: grid;
      gap: 3px;
    }

    .bfe-mini-games-head span {
      color: #f08a18;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.12em;
    }

    .bfe-mini-games-head strong {
      font-size: 16px;
      font-weight: 900;
    }

    .bfe-mini-games-close {
      min-width: 74px;
      height: 38px;
      border: 0;
      border-radius: 999px;
      color: #174474;
      background: #eaf7ff;
      font: 900 13px "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      cursor: pointer;
    }

    .bfe-mini-games-panel iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #eaf7ff;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (() => {
      const videoSrc = './onboarding/phase2-transition.mp4';
      const overlayLabel = '第二阶段入口';

      const attachVideo = () => {
        const overlay = document.querySelector(`[aria-label="${overlayLabel}"]`);
        if (!overlay || overlay.dataset.phase2VideoAttached === 'true') return;
        const still = overlay.querySelector('img');
        if (!still) return;

        overlay.dataset.phase2VideoAttached = 'true';

        const video = document.createElement('video');
        video.className = 'phase2-transition-video';
        video.src = videoSrc;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.preload = 'auto';
        video.setAttribute('aria-hidden', 'true');
        video.addEventListener('ended', () => overlay.click(), { once: true });
        video.addEventListener('error', () => overlay.click(), { once: true });

        still.replaceWith(video);

        const play = video.play();
        if (play && typeof play.catch === 'function') {
          play.catch(() => overlay.click());
        }
      };

      const observer = new MutationObserver(() => attachVideo());
      const start = () => {
        observer.observe(document.body, { childList: true, subtree: true });
        attachVideo();
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start, { once: true });
      } else {
        start();
      }
    })();
  </script>
  <script src="./mini-games-bridge.js"></script>
</body>
</html>
